<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Auto Typer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f2f5; }
        .btn { display: inline-block; padding: 12px 24px; font-weight: bold; border-radius: 5px; text-decoration: none; margin: 10px; cursor: pointer; }
        .reg { background: #28a745; color: white; border: 2px dashed #fff; box-shadow: 0 0 0 2px #28a745; }

    </style>
</head>
<body>

    <h1>⌨️ AutoTyper起動</h1>
    
    <p>① 下の緑のボタンを<b>上のブックマークバーへドラッグ</b>してください</p>
    <a class="btn reg" href="javascript:(async()=>{if(window.__autoJapaneseTyper?.stop){window.__autoJapaneseTyper.stop()}const s=document.createElement('script');s.src='https://Ryu-376.github.io/autotyping/auto-typer.user.js';document.body.appendChild(s);})();">★ Auto Typerを登録</a>

    <p>② 下のボタンでサイトを開き、開いたら<b>登録したブックマークをクリック</b>します。</p>
    <button class="btn open" onclick="window.open('https://otonasi-muonn.github.io/typing_game/', '_blank')">タイピングサイトを開く</button>
